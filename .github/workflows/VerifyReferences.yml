name: Verify references

# Reference / citation check: every DOI / arXiv id in docs/references.bib must
# resolve to real metadata (Crossref / arXiv) via `doiget verify`, or the check
# FAILS. A reference that does not exist can never pass silently — it either
# fails here or is explicitly excepted in docs/references.allow (with a reason).
# The full result is posted as a sticky PR comment AND the job summary, so a
# broken citation is visible without opening the CI logs.
#
# Gating (the authority is .github/scripts/verify_references_gate.py, not
# doiget's own exit code):
#   illegal | absent            -> FAIL   (malformed, or does not resolve)
#   unreachable | unverifiable  -> warn   (transient network / 429; not gated,
#                                          so infra flakiness never blocks a PR)
#   a BROKEN id/key in references.allow -> downgraded to an acknowledged exception
#
# The offline companion check ("every bibkey cited in the source has an entry in
# references.bib", cited ⊆ bib) is a small project-specific test you add once
# your citation convention is fixed; point it at the same REFERENCES_BIB path so
# the two never disagree on which file is canonical.

on:
  pull_request:
    paths:
      - "docs/references.bib"
      - "docs/references.allow"
      - ".github/workflows/VerifyReferences.yml"
      - ".github/scripts/verify_references_gate.py"
  push:
    branches: [main]
    paths:
      - "docs/references.bib"
      - "docs/references.allow"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write # post the sticky result comment

# Single source of truth for the bibliography + allowlist paths.
env:
  REFERENCES_BIB: docs/references.bib
  REFERENCES_ALLOW: docs/references.allow

jobs:
  verify:
    name: verify references resolve
    # GitHub-hosted: the job builds the doiget Rust binary and needs outbound
    # access to Crossref / arXiv — intentionally not on a self-hosted runner.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # doiget's resolver cache: an unchanged bibliography resolves with zero
      # network calls; keyed on the .bib so a new reference re-fetches only the
      # delta.
      - uses: actions/cache@v6
        with:
          path: ~/.cache/doiget
          key: doiget-resolver-${{ hashFiles(env.REFERENCES_BIB) }}
          restore-keys: doiget-resolver-
      # Pinned to the same toolchain SHA the doiget workspace CI uses.
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Install doiget
        run: cargo install --git https://github.com/sotashimozono/doiget.git --tag v0.8.6 --locked doiget-cli
      - name: Verify references
        id: check
        run: |
          # Resolve every reference. Keep the JSON-Lines even if doiget's own
          # exit code is nonzero — the gate script is the authority on pass/fail.
          doiget verify "$REFERENCES_BIB" --format auto --mode json > verify.jsonl || true
          # Writes report.md, and broken=/ok=/transient= to $GITHUB_OUTPUT. Never
          # fails the step (|| true) so the PR comment below always posts; the
          # Gate step decides the job outcome from the `broken` count.
          python3 .github/scripts/verify_references_gate.py \
            --bib "$REFERENCES_BIB" \
            --allow "$REFERENCES_ALLOW" \
            --report report.md \
            --github-output "$GITHUB_OUTPUT" < verify.jsonl || true
          cat report.md >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
      - name: Comment result on the PR
        if: ${{ github.event_name == 'pull_request' }}
        # Fork PRs get a read-only token and cannot comment; don't error on that.
        continue-on-error: true
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('report.md', 'utf8');
            const marker = '<!-- verify-references-gate -->';
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
      - name: Gate — fail on broken or unverified references
        if: ${{ steps.check.outputs.fail != '0' }}
        run: |
          echo "::error::${{ steps.check.outputs.fail }} reference(s) failed — broken=${{ steps.check.outputs.broken }} (unresolved/malformed, not in docs/references.allow), unverified=${{ steps.check.outputs.unverified }} (produced no verify record)"
          exit 1
