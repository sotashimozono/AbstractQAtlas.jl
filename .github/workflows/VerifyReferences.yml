name: Verify references
on:
  pull_request: { paths: ['docs/references.bib', 'docs/references.allow'] }
  push: { branches: [main], paths: ['docs/references.bib', 'docs/references.allow'] }
permissions: { contents: read, pull-requests: write }
jobs:
  citations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: QAtlasHub/doiget-citation-check@v1
        with: { bib: docs/references.bib, allow: docs/references.allow }
